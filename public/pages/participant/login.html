<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — ExcelQuiz Pro</title>
  <meta name="description" content="Masuk ke ExcelQuiz Pro untuk memulai ujian praktik Microsoft Office" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="../../styles/login.css" />
  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="/js/config/app.config.js"></script>
  <script src="../../js/core/supabase.js"></script>
  <script src="../../js/core/auth.js"></script>
  <script src="../../js/modules/exam/exam-api.js"></script>
  <script src="../../js/modules/dashboard/dashboard-api.js"></script>
  <script src="../../js/utils/api.js"></script>
  <script src="../../js/utils/error-handler.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>

  <div class="login-wrapper">

    <!-- Logo -->
    <div class="logo-block">
      <div class="logo-icon">EQ</div>
      <div class="logo-title">ExcelQuiz Pro</div>
      <div class="logo-sub">Sistem Ujian Praktik Microsoft Office</div>
    </div>

    <!-- Institute Badge -->
    <div class="institute-badge">
      <strong>🏛 LEMBAGA SISTEM INFORMASI</strong>
      Universitas Muhammadiyah Yogyakarta
    </div>

    <!-- Card -->
    <div class="login-card">


      <!-- Alert -->
      <div class="alert" id="alert-msg"></div>

      <!-- LOGIN FORM -->
      <div class="form-panel active" id="panel-login">
        <form id="form-login" onsubmit="handleLogin(event)">

          <div class="form-group">
            <label class="form-label" for="login-email">Email</label>
            <div class="input-wrap">
              <input type="email" id="login-email" class="form-input" placeholder="nama@email.com" required
                autocomplete="email" />
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" for="login-password">Password</label>
            <div class="input-wrap">
              <input type="password" id="login-password" class="form-input has-icon" placeholder="••••••••" required
                autocomplete="current-password" />
              <button type="button" class="input-icon" id="toggle-pw-login"
                onclick="togglePw('login-password','toggle-pw-login')" title="Tampilkan/sembunyikan">👁</button>
            </div>
          </div>

          <button type="submit" class="btn-submit" id="btn-login">
            <div class="spinner-sm"></div>
            <span class="btn-text">▶ &nbsp;Masuk ke Ujian</span>
          </button>
        </form>
      </div>


    </div><!-- /card -->

    <div class="version-badge">ExcelQuiz Pro v2.0 · UMY LSI</div>

  </div><!-- /wrapper -->

  <script src="../../js/modules/login/login.js"></script>
</body>

</html>
