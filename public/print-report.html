<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Laporan Ujian</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #fff; font-family: 'Times New Roman', Times, serif; }
    @page { size: A4; margin: 8mm 12mm; }
    @media print {
      body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .no-print { display: none !important; }
    }
    .btn-print {
      display: block;
      margin: 16px auto;
      padding: 10px 32px;
      background: #c8102e;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.04em;
    }
    .btn-print:hover { background: #a00d24; }
  </style>
  <script src="/shared/report-generation/report-generator.js"></script>
</head>
<body>
  <button class="btn-print no-print" onclick="window.print()">🖨️ Cetak / Download PDF</button>
  <div id="report-container">Memuat laporan...</div>
  <script>
    (async function() {
      const urlParams = new URLSearchParams(window.location.search);
      const sessionId = urlParams.get('sessionId');
      
      let opts = null;
      if (sessionId) {
        try {
          const response = await fetch(`/api/session-report/${sessionId}`);
          if (response.ok) {
            const resData = await response.json();
            if (resData && resData.data) {
              const d = resData.data;
              opts = {
                candidateName: d.candidate ? d.candidate.name : '—',
                candidateNim: d.candidate ? d.candidate.nim : '—',
                totalScore: d.total_score,
                maxScore: d.max_score,
                examType: d.exam_type,
                level: d.level,
                date: d.started_at,
                answers: d.answers
              };
            }
          }
        } catch (err) {
          console.error('Failed to fetch session report from API:', err);
        }
      }
      
      // Fallback to localStorage if no sessionId or API failed
      if (!opts) {
        const dataStr = localStorage.getItem('print-report-data');
        if (dataStr) {
          try {
            opts = JSON.parse(dataStr);
          } catch(e) {}
        }
      }
      
      if (!opts) {
        document.getElementById('report-container').textContent = 'Data laporan tidak ditemukan.';
        return;
      }
      
      document.title = `Laporan Ujian — ${opts.candidateName || 'Peserta'}`;
      if (window.ReportGenerator) {
        document.getElementById('report-container').innerHTML = window.ReportGenerator.buildHTML(opts);
        // Auto-print
        setTimeout(() => {
          window.print();
        }, 500);
      } else {
        document.getElementById('report-container').textContent = 'Error: ReportGenerator tidak ditemukan.';
      }
    })();
  </script>
</body>
</html>
