<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login — ExamQuiz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/shared/global-styles/login.css"/>
  <script src="/shared/external-libraries/supabase-sdk.js"></script>
  <script src="/shared/external-libraries/sweetalert2.js"></script>
  <script src="/shared/app-configuration/app.config.js"></script>
  <script src="/shared/authentication-services/supabase-client.js"></script>
  <script src="/shared/authentication-services/auth-handler.js"></script>
  <script src="/shared/api-utilities/api-helper.js"></script>
  <script src="/shared/error-handling/error-handler.js"></script>
  <style>
    /* Admin login uses gold accent — override brand button */
    #admin-logo-icon {
      background: linear-gradient(135deg, #c9a84c, #a8893a) !important;
      color: #142b26 !important;
    }
    #btn-admin-login {
      background: linear-gradient(135deg, #c9a84c, #a8893a) !important;
      color: #142b26 !important;
      box-shadow: 0 3px 12px rgba(201,168,76,0.35) !important;
    }
    #btn-admin-login:hover:not(:disabled) {
      box-shadow: 0 8px 20px rgba(201,168,76,0.4) !important;
    }
  </style>
</head>
<body>
<div class="login-wrapper">
  <div class="logo-block">
    <div class="logo-icon" id="admin-logo-icon">AD</div>
    <div class="logo-title">Admin Panel</div>
    <div class="logo-sub">Monitoring & Manajemen Ujian</div>
  </div>

  <div class="login-card">
    <div class="admin-badge">ADMINISTRATION ACCESS</div>
    <form id="form-admin-login">
      <div class="form-group">
        <label class="form-label">Email Admin</label>
        <input type="email" id="admin-email" class="form-input" placeholder="admin@email.com" required/>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" id="admin-password" class="form-input" placeholder="••••••••" required/>
      </div>
      <button type="submit" class="btn-submit" id="btn-admin-login">
        <span class="btn-text">🔒 Masuk ke Dashboard</span>
      </button>
    </form>
  </div>

</div>

<script>
  document.getElementById('form-admin-login').onsubmit = async (e) => {
    e.preventDefault();
    const email = document.getElementById('admin-email').value;
    const pw = document.getElementById('admin-password').value;
    const btn = document.getElementById('btn-admin-login');
    
    btn.disabled = true;
    btn.innerHTML = 'Memverifikasi...';

    try {
      const { user } = await SupabaseClient.signIn(email, pw);
      const profile = await SupabaseClient.getUserProfile(user.id);

      if (profile && profile.role === 'admin') {
        Swal.fire({ icon: 'success', title: 'Akses Diterima', text: 'Membuka Dashboard...', timer: 1500, showConfirmButton: false });
        setTimeout(() => window.location.href = '/admin', 1500);
      } else {
        await SupabaseClient.signOut(); // Logout if not admin
        Swal.fire({ icon: 'error', title: 'Akses Ditolak', text: 'Akun ini bukan akun Admin.' });
        btn.disabled = false;
        btn.innerHTML = '🔒 Masuk ke Dashboard';
      }
    } catch(err) {
      let msg = err.message || 'Login gagal';
      if (msg.includes('Invalid login credentials') || msg.includes('Invalid login') || msg.includes('invalid_credentials')) {
        msg = 'Email atau password salah. Silakan periksa kembali data Anda.';
      } else if (msg.includes('Email not confirmed')) {
        msg = 'Email Anda belum dikonfirmasi. Silakan verifikasi email Anda terlebih dahulu.';
      } else if (msg.includes('rate limit') || msg.includes('Rate limit exceeded')) {
        msg = 'Terlalu banyak percobaan login. Silakan tunggu beberapa menit sebelum mencoba lagi.';
      } else if (msg.includes('network') || msg.includes('Failed to fetch')) {
        msg = 'Gagal terhubung ke server/jaringan. Silakan periksa koneksi internet Anda.';
      }
      Swal.fire({ icon: 'error', title: 'Login Gagal', text: msg });
      btn.disabled = false;
      btn.innerHTML = '🔒 Masuk ke Dashboard';
    }
  };
</script>
</body>
</html>
